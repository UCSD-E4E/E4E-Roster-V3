services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      - VIEWS_DIR=/app/views
      - STATIC_DIR=/app/public
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-e4e_roster}
      POSTGRES_USER: ${DB_USER:-e4e}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-e4e} -d ${DB_NAME:-e4e_roster}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  github-app:
    build:
      context: .
      dockerfile: github-app/Dockerfile
    ports:
      - "${GITHUB_APP_PORT:-3001}:3001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  slackbot:
    build:
      context: .
      dockerfile: slackbot/Dockerfile
    ports:
      - "127.0.0.1:${SLACK_INTERNAL_PORT:-3002}:3002"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
