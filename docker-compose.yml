services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Port binding is useful for direct access / health checks.
    # Once Traefik is the sole entry point in production, this can be removed.
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    env_file: .env
    environment:
      - VIEWS_DIR=/app/views
      - STATIC_DIR=/app/public
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.roster.rule=Host(`${ROSTER_HOST}`)"
      - "traefik.http.routers.roster.entrypoints=websecure"
      - "traefik.http.routers.roster.tls.certresolver=letsencrypt"
      - "traefik.http.services.roster.loadbalancer.server.port=3000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-e4e_roster}
      POSTGRES_USER: ${DB_USER:-e4e}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-e4e} -d ${DB_NAME:-e4e_roster}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  github-app:
    build:
      context: .
      dockerfile: github-app/Dockerfile
    ports:
      - "${GITHUB_APP_PORT:-3001}:3001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  slackbot:
    build:
      context: .
      dockerfile: slackbot/Dockerfile
    ports:
      - "127.0.0.1:${SLACK_INTERNAL_PORT:-3002}:3002"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  outline-connector:
    image: burritosoftware/outline-authentik-connector:latest
    restart: unless-stopped
    env_file: .env
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.outline-connector.rule=Host(`${OUTLINE_CONNECTOR_HOST}`)"
      - "traefik.http.routers.outline-connector.entrypoints=websecure"
      - "traefik.http.routers.outline-connector.tls.certresolver=letsencrypt"
      - "traefik.http.services.outline-connector.loadbalancer.server.port=80"

volumes:
  postgres_data:

networks:
  default: {}
  traefik_proxy:
    external: true
