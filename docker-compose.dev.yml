services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    volumes:
      - ./backend/src:/app/src                 # hot reload on source changes
      - ./backend/views:/app/views             # hot reload on template changes
      - ./frontend/static:/app/public          # live static assets
      - ./backend/certs:/app/certs             # CA certs for LDAP/TLS (gitignored)
      - backend_node_modules:/app/node_modules # isolate container's node_modules
    environment:
      NODE_ENV: dev

  github-app:
    build:
      context: .
      dockerfile: github-app/Dockerfile.dev
    volumes:
      - ./github-app/src:/app/src
      - ./github-app/private-keys:/app/private-keys
      - github_app_node_modules:/app/node_modules
    environment:
      NODE_ENV: dev

  # Forwards GitHub webhooks from smee.io to the github-app container (dev only)
  smee:
    image: node:20-alpine
    env_file: .env
    command: >
      sh -c "npm install -g smee-client &&
             smee --url $$SMEE_URL --target http://github-app:${GITHUB_APP_PORT:-3001}/webhook"
    depends_on:
      - github-app
    restart: unless-stopped

volumes:
  backend_node_modules:
  github_app_node_modules:
